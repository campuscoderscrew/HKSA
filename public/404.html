<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/?redirect=' + encodeURIComponent(path),
      );
    </script>
  </head>
</html>
